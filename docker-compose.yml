services:
  assistant:
    build: .
    container_name: it-assistant
    ports:
      - "8123:8000"
    env_file:
      - .env
    volumes:
      - ./gcal_credentials.json:/app/gcal_credentials.json:ro
      - ./gmail_token_personal.json:/app/gmail_token_personal.json
      - ./gmail_token_biz.json:/app/gmail_token_biz.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: it-assistant-tunnel
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - assistant
    network_mode: "service:assistant"
